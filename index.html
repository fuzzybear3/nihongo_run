<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- user-scalable=no prevents pinch-zoom interfering with touch controls -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Nihongo Run</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      touch-action: none;
    }
    canvas {
      /* Fill the viewport while keeping the canvas's own aspect ratio.
         width drives the scale; height follows proportionally via auto. */
      width: min(100vw, 50vh);
      height: auto;
      display: block;
    }
    #loading {
      position: absolute;
      color: #555;
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 0.1em;
    }
  </style>
  <!-- trunk replaces this link with the compiled WASM + JS glue -->
  <link data-trunk rel="rust" data-cargo-features="webgl2"
        data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int" />
  <!-- copy the assets directory to dist so the asset server can find runtime files -->
  <link data-trunk rel="copy-dir" href="assets" />
</head>
<body>
  <div id="loading">loading...</div>
  <script>
    const observer = new MutationObserver(() => {
      if (document.querySelector('canvas')) {
        document.getElementById('loading').style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
